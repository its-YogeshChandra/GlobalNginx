worker_processes auto;

events {
  worker_connection 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 20M;
}

upstream coursesellingfrontend {
  server coursesellingfrontend:3000;
}

upstream coursesellingbackend {
 server coursesellingbackend:8080;
}

upstream streamweaverfrontend {
  server streamweaverfrontend:5040;
}

upstream streamweaverbackend {
  server streamweaverbackend:5040;
}
