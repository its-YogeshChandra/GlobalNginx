server {
    listen 80;
    server_name seclan.live;
    
    location / {
        return 301 https://$host$request_uri;
    }
} 

server {
    #wireguard ip address
    listen [IP_ADDRESS];
    server_name : streamweaver.seclan.live;

   location / {
    proxy_pass http://streamweaver_frontend:4000;

    #headers to allow main service to access details
    proxy_set_header Host $host;
    proxy_set_header  X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    #increase timeouts for long running videos
    proxy_connect_timeout 200s;
    proxy_send_timeout 200s;
    proxy_read_timeout 200s;
    send_timeout 200s;
   } 
    
}



