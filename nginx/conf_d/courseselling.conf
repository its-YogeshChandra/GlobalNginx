server {
    listen 80;
    listen [::]:80;
    server_name learnverge.site;

    #redirect all http to https 
    location / {
        return 301 https://$host$request_uri;
    } 
}

server{
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name learnverge.site

    #ssl certificates 
    ssl_certificate /etc/letsencrypt/live/learnverge.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learnverge.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- API requests → backend container ----
    location /api/ {
        proxy_pass http://courseselling_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for file uploads
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        client_max_body_size 50M;
    }

    # ---- Everything else → frontend container ----
    location / {
        proxy_pass http://courseselling_frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}