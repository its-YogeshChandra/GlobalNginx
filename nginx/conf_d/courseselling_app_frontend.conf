#Build stage FROM node:20-alpine AS builder
FROM node:20-alpine AS builder

# Install pnpm
RUN corepack enable && corepack prepare pnpm@latest --activate

WORKDIR /app

#copy package files 
COPY package.json pnpm-lock.yaml ./

#install dependencies 
RUN pnpm install --frozen-lockfile

#Copy source code and config
COPY . .

#Build argument for vite env vars 
ARG VITE_LOGIN_USER
ARG VITE_SIGNUP_USER
ARG VITE_GOOGLE_USER
ARG VITE_AUTHME_URL
ARG VITE_COURSE_URL 
ARG VITE_LESSON_URL
ARG VITE_GETCOURSE_URL 
ARG VITE_GETCOURSE_LESSONS_URL
ARG VITE_ISPRESENT_URL
ARG VITE_ADDSUBSCRIPTION_URL
ARG VITE_GOOGLE_CLIENT_ID
ARG VITE_COURSE_ADDTOCOMPLETION_URL
ARG VITE_COURSE_CHECKCOMPLETION_URL
ARG VITE_FINDUSER_URL
ARG VITE_UPDATEPASSWORD_URL
ARG VITE_UPDATEPROFILE_URL
ARG VITE_LOGOUT_USER

#Build the app 
RUN pnpm run build 

#Production stage 
FROM nginx:alpine 

#Copy built assets to nginx 
COPY --from=builder /app/dist /usr/share/nginx/html 

#Copy nginx config 
COPY nginx.conf /etc/nginx/nginx.conf 

#Expose port 
EXPOSE 80 

#Start nginx 
CMD ["nginx", "-g", "daemon off;"]