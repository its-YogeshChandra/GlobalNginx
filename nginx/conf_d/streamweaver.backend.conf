server {
    listen 80;
    server_name seclan.live;
    
    location / {
        return 301 https://$host$request_uri;
    }
} 

server {
    # listen on the wireguard ip 
    listen [IP_ADDRESS]; 
    server_name : api.streamweaver.seclan.live;

    #security headers 

    #location block 
    location / {
        proxy_pass http://streamweaver_backend:9000;

        #headers to allow main service to access details
        proxy_set_header Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        #increase timeouts for long running videos
        proxy_connect_timeout 100s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        send_timeout 30s;
    } 
}





