server {
    # listen on the wireguard ip address
    listen 80;

    server_name api.streamweaver.seclan.live;

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        # resolve at request time so nginx doesn't crash if backend is down
        resolver 127.0.0.11 valid=30s;
        set $upstream_streamweaver_backend http://sweaver-backend:8080;
        proxy_pass $upstream_streamweaver_backend;
        proxy_http_version 1.1;

        # headers — pass real client info to the backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # ssl is terminated on cloud VPS, so original request is always https
        proxy_set_header X-Forwarded-Proto https;

        # increase timeouts for video processing / yt-dlp operations
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;
    }
}
