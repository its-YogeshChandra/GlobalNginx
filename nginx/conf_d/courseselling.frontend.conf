server {
    # listen on the wireguard ip address
    listen 10.66.66.3:80;

    server_name learnverge.site;

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        # resolve at request time so nginx doesn't crash if frontend is down
        resolver 127.0.0.11 valid=30s;
        set $upstream_courseselling_frontend http://courseselling_frontend:3000;
        proxy_pass $upstream_courseselling_frontend;
        proxy_http_version 1.1;

        # websocket support (hot reload, real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # headers — pass real client info to the frontend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # ssl is terminated on cloud VPS, so original request is always https
        proxy_set_header X-Forwarded-Proto https;

        # timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;
    }
}
