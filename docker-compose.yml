#list all the services available in the system
services:
  courseselling_backend:
   build: 
    context: ${COURSESELLING_BACKEND_PATH} #relative path to the repo 
    dockerfile: Dockerfile 
   expose:
    - "8080"
   networks: 
    - app-network

  courseselling_frontend:
   build: 
    context: ${COURSESELLING_FRONTEND_PATH} #relative path to the repo 
    dockerfile : Dockerfile
   expose: 
    - "3000"
   networks: 
    - app-network

 #for the streamweaver application 
  streamweaver_backend:
   build: 
    context: ${STREAMWEAVER_BACKEND_PATH} #relative path to the repo
    dockerfile: Dockerfile
   expose: 
    - "9000"
   networks: 
    - app-network

#for streamweaver frontend 
  streamweaver_frontend:
   build: 
    context: ${STREAMWEAVER_FRONTEND_PATH} #relative path to the repo 
    dockerfile: Dockerfile
   expose: 
    - "4000"
   networks: 
    - app-network

#for global nginx conf
  nginx:
   build : ./nginx
   ports: 
    - "80:80"
    - "443:443"

   volumes : 
    - /etc/letsencrypt:/etc/letsencrypt:ro  #mount host certs, read-only 

   depends_on:
    - courseselling_backend
    - courseselling_frontend
    - streamweaver_backend
    - streamweaver_frontend
   networks: 
    - app-network
   restart: unless-stopped

#list all the networks available in the system
networks:
 app-network:
  driver: bridge